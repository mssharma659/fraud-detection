<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#0f172a; color:white;">

<div class="d-flex">

    <!-- Sidebar -->
    <div style="width:250px; background:#020617; height:100vh; padding:20px;">
        <h4>🚀 Dashboard</h4>
        <hr>

        <a href="/admin" class="btn btn-dark w-100 mb-2">Home</a>
        <a href="/add" class="btn btn-success w-100 mb-2">Add Person</a>
        <a href="/auto" class="btn btn-warning w-100 mb-2">Auto Data</a>
        <a href="/graph" class="btn btn-primary w-100 mb-2">Analytics</a>
        <a href="/logout" class="btn btn-danger w-100 mt-3">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">

        <h2>📊 Admin Dashboard</h2>

        <form method="GET" action="/admin" class="mb-4">
    </form>

        <!-- Search -->
        <form method="GET" action="/admin" class="mb-3">
    <input name="search" placeholder="Search name / income / fraud (0/1)" 
           class="form-control w-50 d-inline">
    <button class="btn btn-primary">Search</button>
</form>

        <!-- Table -->
        <div class="card p-3 bg-dark">
            {{table | safe}}
        </div>

    </div>

</div>

</body>
</html>
