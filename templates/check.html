<!DOCTYPE html>
<html>
<head>
    <title>Check Person</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #667eea, #764ba2);">

<div class="container mt-5">
    <div class="card p-4 shadow-lg" style="border-radius:20px;">
        <h2 class="text-center mb-4">🔍 Fraud Analysis</h2>

        <form method="POST">
            <input class="form-control mb-3" name="name" placeholder="Name">
            <input class="form-control mb-3" name="age" placeholder="Age">
            <input class="form-control mb-3" name="income" placeholder="Income">
            <input class="form-control mb-3" name="transactions" placeholder="Transactions">
            <input class="form-control mb-3" name="criminal" placeholder="Criminal (0/1)">
            <input class="form-control mb-3" name="loan_default" placeholder="Loan Default (0/1)">
            <input class="form-control mb-3" name="suspicious_score" placeholder="Suspicious Score">

            <button class="btn btn-dark w-100">Analyze</button>
        </form>
    </div>
</div>

</body>
</html>
