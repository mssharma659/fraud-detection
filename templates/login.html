<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #141e30, #243b55);">

<div class="container mt-5">
    <div class="card p-4 shadow-lg mx-auto" style="max-width:400px; border-radius:20px;">
        <h3 class="text-center mb-3">🔐 Admin Login</h3>

        <form method="POST">
            <input class="form-control mb-3" name="username" placeholder="Username">
            <input class="form-control mb-3" name="password" type="password" placeholder="Password">

            <button class="btn btn-dark w-100">Login</button>
        </form>
    </div>
</div>

</body>
</html>
