<!DOCTYPE html>
<html>
<head>
    <title>Add Person</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3>Add New Person</h3>

        <form method="POST">
            <input class="form-control m-2" name="name" placeholder="Name">
            <input class="form-control m-2" name="age" placeholder="Age">
            <input class="form-control m-2" name="income" placeholder="Income">
            <input class="form-control m-2" name="transactions" placeholder="Transactions">
            <input class="form-control m-2" name="criminal" placeholder="Criminal (0/1)">
            <input class="form-control m-2" name="loan_default" placeholder="Loan Default (0/1)">
            <input class="form-control m-2" name="suspicious_score" placeholder="Suspicious Score">

            <button class="btn btn-success">Save Data</button>
        </form>
    </div>
</div>

</body>
</html>
