<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: #0f2027; color:white;">

<div class="container text-center mt-5">
    <div class="card p-5 shadow-lg" style="border-radius:20px; background:#1c1c1c;">
        
        <h1 class="mb-3">{{result}}</h1>
        <h3>Risk Score: {{score}}%</h3>

        {% if result == "Fraud" %}
            <div class="alert alert-danger mt-3">⚠ High Risk Detected</div>
        {% else %}
            <div class="alert alert-success mt-3">✅ Safe Profile</div>
        {% endif %}

        <a href="/" class="btn btn-light mt-4">Back</a>
    </div>
</div>

</body>
</html>
